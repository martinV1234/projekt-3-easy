<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #canvas {
            border: 1px solid black;
        }
    </style>
</head>
<script>
    let player_key = ''; // prg key parast tyhi kui kustub kana ara
    let user = '';
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('Nsubmit').onclick = function() {
            const input = document.getElementById('Ninput');
            if (player_key === '') {
                join(input.value);
            } else {
                alert("u got key");
            }
        };
    });
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('Tsubmit').onclick = function() {
            console.log("talking");
            const input = document.getElementById('Tinput');
            talk(input.value);
        };
    });
    document.addEventListener('DOMContentLoaded', function() {
        let canvass = document.getElementById("canvas");
        canvass.addEventListener("click", function (e) {
            move(canvass, e);
        });
    });

    async function join(username) {
        const messageData = { action: 'join', username: username };
        
        const response = await fetch('https://tinkr.tech/sdb/poly/wander', {
            method: 'POST',
            headers: {
            'Content-Type': 'application/json'
            },
            body: JSON.stringify(messageData)
        });
        
        const result = await response.json();
        player_key = result.player_key;
        user = username;
    }

    async function talk(talk) {
        const messageData = { action: 'talk', player_key: player_key, message: talk };
        
        const response = await fetch('https://tinkr.tech/sdb/poly/wander', {
            method: 'POST',
            headers: {
            'Content-Type': 'application/json'
            },
            body: JSON.stringify(messageData)
        });
        
        const result = await response.json();
        console.log(result);
    }

    async function move(canvas, move) {
        const rect = canvas.getBoundingClientRect();
        const messageData = { action: 'move', player_key: player_key, x: move.clientX - rect.left, y: move.clientY - rect.top };
        
        const response = await fetch('https://tinkr.tech/sdb/poly/wander', {
            method: 'POST',
            headers: {
            'Content-Type': 'application/json'
            },
            body: JSON.stringify(messageData)
        });
        
        const result = await response.json();
    }

    async function getdata() {
        const response = await fetch('https://tinkr.tech/sdb/poly/wander');
        const data = await response.json();
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML = '';
        data.players.forEach(player => {
            const img = document.createElement('img');
            img.src = `https://tinkr.tech${player.image}`;
            img.alt = player.username;
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            img.onload = function() {
                ctx.fillText(player.username, player.x + 5, player.y - 5);
                ctx.fillText(player.message, player.x, player.y - 20);
                ctx.drawImage(img, player.x, player.y, player.width, player.height);
            };
        });
    }
    setInterval(getdata, 2000);
</script>
<body>
    <textarea id="Ninput" rows="1" cols="10"></textarea>
    <button id="Nsubmit">Submit Name</button>
    <h1>Game:</h1>
    <textarea id="Tinput" rows="1" cols="10"></textarea>
    <button id="Tsubmit">Submit Text</button>
    <div id="output"></div>
    <canvas id="canvas" width="800" height="600"></canvas>
</body>
</html>
